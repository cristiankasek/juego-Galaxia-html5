<!doctype html>
<html>
	<head>
		<meta charset="UTF-8">
		<link rel="stylesheet" href="estilos.css">
		<title>Galaxia</title>
		<script type="text/javascript" src="funciones.js"></script>
		<link rel="manifest" href="manifest.json">
	</head>
	<body>
		<fieldset>
			<legend> <h1>GALAXIA</h1></legend>
			<form>
				<label for="nombre">Nombre del jugador:</label>
				<input type="text" id="nombre"  placeholder="Escribe tu nombre una vez">
				<button onclick="guardarNombre()" id="btn-guardar">Guardar Nombre</button>
					
			</form> 
		</fieldset> <br>
		<canvas id="miCanvas" width="600px" height="500px">
			Tu navegador no soporta CANVAS
		</canvas>
	 
		<div class="botonesDiv">
			<button class="botonesMover" onclick="verifica(true,37)">&lt;-</button>
			<button class="botonDisparo" onclick="verifica(true,32)">Fire</button>
			<button class="botonesMover" onclick="verifica(true,39)">-&gt;</button>
			<button class="botonReiniciar" onclick="reiniciar()">Jugar</button>
		</div>
		<canvas id="ranking" width="600px" height="200px">
			<div id="pantalla-tiempo-real">				
				<h2>Ranking en tiempo real</h2>
				<ul id="ranking-list"></ul>
					
			</div>
		</canvas>
	</body>		

</html>
